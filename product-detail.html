<!doctype html>
<html lang="en" class="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Grocery Mart</title>

        <!-- Favicon -->
        <link rel="icon" type="image/png" href="./assets/favicon/favicon-96x96.png" sizes="96x96" />
        <link rel="icon" type="image/svg+xml" href="./assets/favicon/favicon.svg" />
        <link rel="shortcut icon" href="./assets/favicon/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-touch-icon.png" />
        <meta name="apple-mobile-web-app-title" content="Grocery" />
        <link rel="manifest" href="./assets/favicon/site.webmanifest" />

        <!-- Fonts -->
        <link rel="stylesheet" href="./assets/fonts/stylesheet.css" />

        <!-- Styles -->
        <link rel="stylesheet" href="./assets/css/main.css" />

        <!-- Script -->
        <script src="./assets/js/script.js"></script>
    </head>
    <body>
        <!-- Header -->
        <header id="header" class="header"></header>
        <script>
            load("#header", "./templates/header-logined.html");
        </script>

        <main class="product-page">
            <div class="container">
                <!-- Search bar -->
                <div class="product-container">
                    <div class="search-bar d-none d-md-flex">
                        <input type="text" placeholder="Search for item" name="" id="" class="search-bar__input" />
                        <button class="search-bar__submit">
                            <img src="./assets/icon/search.svg" alt="" class="search-bar__icon icon" />
                        </button>
                    </div>
                </div>

                <!-- Breadcrumbs -->
                <div class="product-container">
                    <!-- Breadcrumbs -->
                    <ul class="breadcrumbs">
                        <li>
                            <a href="" class="breadcrumbs__link"
                                >Departments
                                <img src="./assets/icon/arrow-right.svg" alt="" class="breadcrumbs__icon" />
                            </a>
                        </li>
                        <li>
                            <a href="" class="breadcrumbs__link"
                                >Coffee
                                <img src="./assets/icon/arrow-right.svg" alt="" class="breadcrumbs__icon" />
                            </a>
                        </li>
                        <li>
                            <a href="" class="breadcrumbs__link"
                                >Coffee Beans
                                <img src="./assets/icon/arrow-right.svg" alt="" class="breadcrumbs__icon" />
                            </a>
                        </li>
                        <li>
                            <a href="" class="breadcrumbs__link breadcrumbs__link--current">LavAzza </a>
                        </li>
                    </ul>
                </div>

                <!-- Product info -->
                <div class="product-container prod-info-content">
                    <div class="row">
                        <div class="col-5 col-xl-6 col-lg-12">
                            <div class="product-preview">
                                <div class="product-preview__list">
                                    <div class="product-preview__item">
                                        <img
                                            class="product-preview__img"
                                            src="./assets/img/products/product-1.png"
                                            alt=""
                                        />
                                    </div>
                                    <div class="product-preview__item">
                                        <img
                                            class="product-preview__img"
                                            src="./assets/img/products/product-2.png"
                                            alt=""
                                            class="product-"
                                        />
                                    </div>
                                    <div class="product-preview__item">
                                        <img
                                            class="product-preview__img"
                                            src="./assets/img/products/product-3.png"
                                            alt=""
                                        />
                                    </div>
                                    <div class="product-preview__item">
                                        <img
                                            class="product-preview__img"
                                            src="./assets/img/products/product-4.png"
                                            alt=""
                                        />
                                    </div>
                                </div>
                                <div class="product-preview__thumbs">
                                    <img
                                        class="product-preview__thumbs-img"
                                        src="./assets/img/products/product-1.png"
                                        alt=""
                                    />
                                    <img
                                        class="product-preview__thumbs-img"
                                        src="./assets/img/products/product-2.png"
                                        alt=""
                                    />
                                    <img
                                        class="product-preview__thumbs-img"
                                        src="./assets/img/products/product-3.png"
                                        alt=""
                                    />
                                    <img
                                        class="product-preview__thumbs-img product-preview__thumbs-img--current"
                                        src="./assets/img/products/product-4.png"
                                        alt=""
                                    />
                                </div>
                            </div>
                        </div>
                        <div class="col-7 col-xl-6 col-lg-12">
                            <form action="" class="form">
                                <section class="prod-info">
                                    <h1 class="prod-info__heading">
                                        Coffee Beans - Espresso Arabica and Robusta Beans
                                    </h1>

                                    <div class="row">
                                        <div class="col-5 col-xxl-6 col-xl-12">
                                            <div class="prod-prop">
                                                <img
                                                    src="./assets/icon/star.svg"
                                                    alt=""
                                                    class="prod-prop__icon prod-prop__icon--center"
                                                />
                                                <h4 class="prod-prop__title">(3.5) 1100 reviews</h4>
                                            </div>

                                            <label for="" class="form__label prod-info__label">Size/Weight</label>

                                            <div class="filter__form-group">
                                                <div class="form__select-wrap">
                                                    <div class="form__select" style="--width: 148px">
                                                        500g
                                                        <img
                                                            src="./assets/icon/arrow-down.svg"
                                                            alt=""
                                                            class="form__select-arrow icon"
                                                        />
                                                    </div>
                                                    <div class="form__select">
                                                        Gram
                                                        <img
                                                            src="./assets/icon/arrow-down.svg"
                                                            alt=""
                                                            class="form__select-arrow icon"
                                                        />
                                                    </div>
                                                </div>
                                            </div>

                                            <div class="filter__form-group">
                                                <div class="form__tags">
                                                    <button class="form__tag prod-info__tag">Small</button>
                                                    <button class="form__tag prod-info__tag">Medium</button>
                                                    <button class="form__tag prod-info__tag">Large</button>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-7 col-xxl-6 col-xl-12">
                                            <div class="prod-props">
                                                <div class="prod-prop">
                                                    <img
                                                        src="./assets/icon/document.svg"
                                                        alt=""
                                                        class="prod-prop__icon icon"
                                                    />
                                                    <h4 class="prod-prop__title">Compare</h4>
                                                </div>
                                                <div class="prod-prop">
                                                    <img
                                                        src="./assets/icon/cart.svg "
                                                        alt=""
                                                        class="prod-prop__icon icon"
                                                    />
                                                    <div>
                                                        <h4 class="prod-prop__title">Delivery</h4>
                                                        <p class="prod-prop__desc">From $6 for 1-3 days</p>
                                                    </div>
                                                </div>
                                                <div class="prod-prop">
                                                    <img
                                                        src="./assets/icon/bag.svg"
                                                        alt=""
                                                        class="prod-prop__icon icon"
                                                    />
                                                    <div>
                                                        <h4 class="prod-prop__title">Pickup</h4>
                                                        <p class="prod-prop__desc">Out of 2 store, today</p>
                                                    </div>
                                                </div>
                                            </div>

                                            <div class="prod-info__card">
                                                <div class="prod-info__row">
                                                    <span class="prod-info__price">$500.00</span>
                                                    <span class="prod-info__tax">10%</span>
                                                </div>
                                                <p class="prod-info__total-price">$540.00</p>
                                                <div class="prod-info__row prod-info__btn-group">
                                                    <button class="btn btn--primary prod-info__card-btn">
                                                        Add to cart
                                                    </button>
                                                    <button class="like-btn prod-info__like-btn">
                                                        <img
                                                            src="./assets/icon/love.svg"
                                                            alt=""
                                                            class="like-btn__icon icon"
                                                        />
                                                        <img
                                                            src="./assets/icon/love-red.svg"
                                                            alt=""
                                                            class="like-btn__icon--liked"
                                                        />
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </section>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer" id="footer"></footer>
        <script>
            load("#footer", "./templates/footer.html");
        </script>
    </body>
</html>
